<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2a5f48" />
    <title>LifeOS offline</title>
    <style>
      :root {
        color: #16201d;
        background: #f6f3ec;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        display: grid;
        min-height: 100vh;
        margin: 0;
        padding: 24px;
      }

      main {
        background: #fffaf0;
        border: 1px solid rgba(22, 32, 29, 0.12);
        border-radius: 18px;
        box-shadow: 0 18px 42px rgba(22, 32, 29, 0.12);
        max-width: 540px;
        padding: 28px;
      }

      h1 {
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        line-height: 1.1;
        margin: 0 0 12px;
      }

      p {
        color: #52615b;
        font-weight: 650;
        line-height: 1.55;
        margin: 0 0 18px;
      }

      a {
        align-items: center;
        background: #2a5f48;
        border-radius: 999px;
        color: #fff;
        display: inline-flex;
        font-weight: 800;
        min-height: 42px;
        padding: 0 16px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>LifeOS is offline</h1>
      <p>The app shell can open without a connection, but saving changes requires access to your account. Reconnect before creating, editing, importing, or deleting LifeOS data.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
